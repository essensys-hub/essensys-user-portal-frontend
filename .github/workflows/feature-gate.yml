name: Feature Gate

on:
  pull_request:
    paths:
      - "features/**"
      - "openspec/changes/**"
      - "docs/features/**"
      - "tests/**"
      - "scripts/feature_lifecycle/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  feature-gate:
    name: Feature Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python3 -m pip install --disable-pip-version-check jsonschema
      - run: python3 scripts/feature_lifecycle/validate_feature_manifests.py
      - run: python3 scripts/feature_lifecycle/check_feature_gate.py
